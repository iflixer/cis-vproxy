#             return 301 https://$host$request_uri;
#         }
#     }

}




# configuration file /etc/nginx/conf.d/server.conf:

log_format mp4_log '[$time_local] $upstream_cache_status code:$status ip:$remote_addr sent:$body_bytes_sent tm:$request_time utm:$upstream_response_time range:$http_range '
            '"$uri$slice_range" "$request_uri" "$http_referer" "$http_user_agent"';

log_format hls_log '[$time_local] $upstream_cache_status code:$status ip:$remote_addr sent:$body_bytes_sent tm:$request_time utm:$upstream_response_time range:$http_range '
            '"$uri$slice_range" "$request_uri" "$http_referer" "$http_user_agent"';

log_format ts_log '[$time_iso8601] $status $upstream_cache_status sent:$body_bytes_sent tm:$request_time utm:$upstream_response_time ip:$remote_addr '
            '"$uri"';


log_format mp4_geo_block '[$time_local] $upstream_cache_status code:$status ip:$remote_addr sent:$body_bytes_sent tm:$request_time utm:$upstream_response_time range:$http_range '
            '"$uri$slice_range" "$request_uri" "$http_referer" "$http_user_agent"';


proxy_cache_path /opt/nginx-cache levels=1:2 keys_zone=my_cache:100m max_size=1000g inactive=7d use_temp_path=off;

#limit_req_zone $binary_remote_addr zone=req_zone_mp4:10m rate=20r/s;
#limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

#protection from caching 0 answers
map $upstream_http_content_length $flag_cache_empty {
	default         0;
	0               1;
}

# this list can be much more then we restrict - exact check happens in balancer, here we just protect the server from china
map $geoip2_country_code $not_allowed_country {
        default 1;
        BR 0;
        PT 0;
        AO 0;
        NL 0;
        GR 0;
        IN 0;
        UA 0;
        IT 0;
        DE 0;
}



server {
    listen 443 default_server ssl http2;
    listen [::]:443 ssl http2;

    server_name _;

    ssl_certificate /etc/letsencrypt/live/cdn67.ntcdn.stream/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn67.ntcdn.stream/privkey.pem;
   # ssl_certificate ssl_certificate.link;
   # ssl_certificate_key ssl_certificate_key.link;


    access_log /var/log/nginx/server.log;
    root   /usr/share/nginx/html;

    #limit_conn conn_limit_per_ip 50;

    sendfile   on;
    tcp_nopush on;

    location / {
        default_type text/html;
        return 200 'HP';
    }

     location /alive {
         default_type text/plain;
         return 200 'OK';
     }

    location /nginx_status_HDHDJEUWOWLLAPQPP10XZ {
        stub_status;
    }

#location ~ ^/details/[a-z0-9]+/(?<cache_filename>[a-z0-9]+\.(js|css))$ { named regex
# old content on separated backend
  location ~* ^/a1/((movies|series)/.*.mp4)$ {
    max_ranges 1;

    if ($not_allowed_country) {
        access_log /var/log/nginx/geo_block.log mp4_geo_block;
        add_header X-Country $geoip2_country_code always;
        return 401;
    }

    access_log /var/log/nginx/mp4.log mp4_log;

    #limit_req zone=req_zone_mp4 burst=30 nodelay;
    #limit_req_status 429;

#storage1
#     set $a1_backend_host pub-a66aac9b0f6e428896c58f98eb0a2d8c.r2.dev;
#storege2
    set $a1_backend_host pub-0294621c779e408e8e27c8cab38b7e83.r2.dev;

    set $a1_backend https://$a1_backend_host/topflix/$1;
    add_header X-B $a1_backend always;

    # links protection
    secure_link $arg_md5,$arg_expires;
    secure_link_md5 "$secure_link_expires$uri$http_referer$host$http_user_agent TpzY3EJO7hgOjUHa";
    if ($http_referer != $arg_ref) {
        add_header X-Code-Source "nginx" always;
        return 402;
    }
    if ($secure_link = "") {
        add_header X-Proxy-Host $host always;
        add_header X-Proxy-Ref $http_referer always;
        add_header X-Proxy-Uri $uri always;
        add_header X-Proxy-Agent $http_user_agent always;
        add_header X-Code-Source "nginx" always;
        return 403;

    }
    if ($secure_link = "0") {
        add_header X-Proxy-Host $host always;
        add_header X-Proxy-Ref $http_referer always;
        add_header X-Proxy-Uri $uri always;
        add_header X-Proxy-Agent $http_user_agent always;
        add_header X-Code-Source "nginx" always;
        return 410;
    }

    # only Range requests allowed
    if ($http_range = "") {
        add_header X-Code-Source "nginx" always;
        return 400;
    }

    #error_page 404 403 429 500 503 /error.php;

    aio threads;
    aio_write on;

    sendfile on;
    #sendfile_max_chunk 2m;

    proxy_http_version     1.1;
    proxy_set_header       Connection "";
    proxy_set_header       Authorization '';
    proxy_set_header       Host $a1_backend_host;

    proxy_hide_header      x-amz-id-2;
    proxy_hide_header      x-amz-request-id;
    proxy_hide_header      x-amz-meta-server-side-encryption;
    proxy_hide_header      x-amz-server-side-encryption;
    proxy_hide_header      x-amz-meta-src_last_modified_millis;
    proxy_hide_header      x-amz-meta-s3cmd-attrs;
    proxy_hide_header      x-amz-version-id;
    proxy_hide_header      Set-Cookie;

    proxy_ignore_headers Vary;
    proxy_force_ranges on;
    proxy_intercept_errors on;
    proxy_ssl_server_name on;

    proxy_pass $a1_backend;
    proxy_cache my_cache;
    #proxy_no_cache $flag_cache_empty;
    #proxy_cache_bypass $flag_cache_empty;
    #proxy_cache_revalidate on;
    proxy_cache_valid 200 206 999h;
#     proxy_cache_valid 404 1h;
    #proxy_cache_valid any 24h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_lock_age 5m;
