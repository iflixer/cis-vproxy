name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit and tag
        id: vars
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "tag=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image NGINX
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cis-vproxy:latest
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Build and push Docker image Webdis
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.webdis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cis-vproxy-webdis:latest
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Build and push Docker image Flixvcdn
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.flixvcdn
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn:latest
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn:${{ steps.vars.outputs.tag }}
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Build and push Docker image Flixvcdn.india
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.flixvcdn.india
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-india:latest
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-india:${{ steps.vars.outputs.tag }}
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Build and push Docker image Flixvcdn.india.openresty
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.flixvcdn.openresty.india
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-openresty-india:latest
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-openresty-india:${{ steps.vars.outputs.tag }}
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Download GeoLite2
        run: |
          mkdir -p geoip
          curl -fsSL "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${{ secrets.MAXMIND_LICENSE_KEY }}&suffix=tar.gz" \
            | tar -xz --strip-components=1 --wildcards -C ./geoip "*/GeoLite2-Country.mmdb"

      - name: Build and push Docker image Flixvcdn.brazil.openresty
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.flixvcdn.openresty.brazil
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-openresty-brazil:latest
            ghcr.io/${{ github.repository_owner }}/cis-vproxy-flixvcdn-openresty-brazil:${{ steps.vars.outputs.tag }}
          build-args: |
            SOURCE_COMMIT=${{ steps.vars.outputs.commit }}
            SOURCE_TAG=${{ steps.vars.outputs.tag }}

      - name: Notify Telegram
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${{ secrets.TG_CHAT_ID }}"'",
              "parse_mode": "Markdown",
              "text": "✅ *Docker образы успешно опубликованы!*\n\n📦 Образы:\n- `${{ secrets.DOCKERHUB_USERNAME }}/cis-vproxy:latest`\n\n🧑 Коммит: `${{ steps.vars.outputs.commit }}`\n🏷️ Тег: `${{ steps.vars.outputs.tag }}`",
              "reply_markup": {
                "inline_keyboard": [[
                  {
                    "text": "🔍 Открыть GitHub Actions",
                    "url": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"
                  }
                ]]
              }
            }'

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "'"${{ secrets.TG_CHAT_ID }}"'",
              "parse_mode": "Markdown",
              "text": "❌ *Ошибка в GitHub Actions Workflow!*\n\n🧑 Автор: ${{ github.actor }}\n📝 Commit: `${{ github.sha }}`",
              "reply_markup": {
                "inline_keyboard": [[
                  {
                    "text": "📄 Открыть лог",
                    "url": "'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'"
                  }
                ]]
              }
            }'