
services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx-njs
    ports:
      - "8089:80"
    environment:
      - WEBDIS_HOST=webdis
      - WEBDIS_PORT=7379
      - TEST_ENV=qwe
      - SIGN_KEY=${SIGN_KEY}
    depends_on:
      - webdis

  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "16379:6379"

  webdis:
    build:
      context: .
      dockerfile: Dockerfile.webdis
    # image: nicolas/webdis:latest
    container_name: webdis
    ports:
      - "17379:7379"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379