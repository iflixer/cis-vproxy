# load_module modules/ngx_http_js_module.so;

# Пробрасываем переменные окружения в Nginx
# env WEBDIS_HOST;
# env WEBDIS_PORT;
# env TEST_ENV;

pid /tmp/nginx.pid;

worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 16384;
    # опционально (на Linux обычно ок и без этого)
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;

    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /dev/stdout;
    # access_log off;
    error_log  /dev/stderr warn;

    sendfile on;
    # чтобы один клиент не монополизировал воркер при очень больших отдачах
    sendfile_max_chunk 1m;   
    tcp_nopush on;
    tcp_nodelay on;


    # aio threads;
    # directio 8m;
    # output_buffers 1 512k;
    # read_ahead 512k;

    open_file_cache max=500000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;


    proxy_cache_max_range_offset 0;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_lock_age 10s;
    proxy_force_ranges on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;


    proxy_cache_valid 200 10d;
    proxy_ignore_client_abort on;
    proxy_intercept_errors on;

    proxy_connect_timeout 5s;
    proxy_send_timeout    15s;
    proxy_read_timeout    30s;
    send_timeout 60s;

    proxy_buffering on;
    proxy_buffers 16 256k;
    proxy_buffer_size 256k;
    proxy_busy_buffers_size 512k;



    map $upstream_http_location $redirect_subdomain {
        default "";
        ~^https?://([a-z]+)\. $1;
    }

    map $request_uri $request_uri_without_subdomain {
        # (https?://HOST/ v2 /)[^/]+ ( /остальное )
        ~^/v2/[^/]+(.*)$   $1;
        default                                $request_uri;
    }

    js_import main from /etc/nginx/js/main.js;
    js_import sign from /etc/nginx/js/check_sign.js;
    js_import follow from /etc/nginx/js/follow_redirect.js;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=backend_cache:256m max_size=400g inactive=30d use_temp_path=off;

    map $arg_filename $safe_filename {
        "~^([0-9A-Za-zА-Яа-яЁё\.\-\_ ]+)$" $1;
        default "";
    }

    map $safe_filename $content_disposition {
        ""      "";
        default 'attachment; filename="$safe_filename"';
    }

    server {
        listen 443 ssl;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept, Origin, Referer, User-Agent" always;
        add_header Access-Control-Max-Age 86400 always;

        # ECC (основной сертификат)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # RSA fallback
        # ssl_certificate     /etc/nginx/certs/fullchain_rsa.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey_rsa.pem;
        ssl_session_cache shared:SSL:200m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;   # обычно хватает, можно не задавать явно
        # можно ужать набор, но без фанатизма
        ssl_protocols TLSv1.2 TLSv1.3;

        js_set $cache_key signer.check_sign;

        location /favicon.ico {
            access_log off;
            return 200;
        }

        location /hello {
            js_content main.hello;
        }

        # простая проверка живости
        location = /alive { 
            add_header Content-Type text/plain; 
            return 200 "OK\n"; 
        }
        location = / { 
            access_log off;
            log_not_found off;
            add_header Content-Type text/plain; 
            return 200 "fcdn-cis HP\n"; 
        }
        location = /myip {
            default_type text/plain;
            return 200 "remote_addr: $remote_addr | realip_remote_addr: $realip_remote_addr | http_x_forwarded_for: $http_x_forwarded_for\n";
        }

        location = /hostname {
            default_type text/plain;
            return 200 "$hostname\n";
        }

        location = /nodename {
            default_type text/plain;
            return 200 "__NODE_NAME__\n";
        }

        # location /test {
        #     default_type text/plain;
        #     return 200 "TEST_ENV is ${TEST_ENV}\n";
        # }

        location /debug-upstream {
            proxy_pass https://httpbin.org/anything;   # или https://httpbun.com/anything
            proxy_set_header X-Forwarded-Host "";
            proxy_set_header X-Debug "from-nginx";
        }

        location = /debug-secret123 {
            js_content debug.show_secret;
        }

        # ====== storage.kinohd.co ======
        # /<filepath>/<sign>:<time>/<filename>
        # location ~ ^/(?<filepath>[a-z]+\/[a-f0-9]+)/(?<sign>[a-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
        location ~ ^/(?<filepath>[a-z0-9-]+/[A-Fa-f0-9]+)/(?<sign>[A-Fa-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
            include /etc/nginx/conf.d/cors.conf;
            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header X-Proxy-loc "base" always;
            add_header X-Proxy-user-ip $remote_addr always;
            proxy_hide_header Server;
            proxy_hide_header X-Powered-By;
            add_header X-Request-Id $request_id always;
            add_header X-Node $hostname always;

            proxy_pass_header Content-Type;

            add_header X-Upstream-Status   $upstream_status always;

            if ($cache_key = "0") {
                add_header X-Proxy-sign /$filepath/-$remote_addr-$time-SECRET always;
                add_header X-Proxy-reason "base_sign" always;
                return 403;
            }

            set $upstream_host storage.kinohd.co;
            set $upstream_path /$filepath/$sign:$time/$filename;
            set $upstream_url https://$upstream_host$upstream_path;

            # add_header X-Upstream-Host $upstream_host always;
            # add_header X-Upstream-Path $upstream_path always;
            # add_header X-Upstream-URL $upstream_url always;
            # add_header X-Upstream-Location $upstream_http_location always;

            # Кэш

            proxy_cache backend_cache;
            # proxy_cache_key $cache_key;
            # proxy_cache_revalidate on;
            proxy_cache_min_uses 1;
            add_header X-Proxy-Cache-Status $upstream_cache_status always;

            # На время отладки НЕ скрываем Location, чтобы увидеть 302 от апстрима
            # proxy_hide_header Location;

            error_page 301 302 303 307 308 = @handle_redirect_main;

            # Хедеры в апстрим — делаем запрос максимально похожим на curl
            proxy_ssl_server_name on;
            proxy_set_header Host              $upstream_host;
            proxy_ssl_name                     $upstream_host;
            # proxy_set_header Range             $http_range;
            # proxy_set_header If-Range          $http_if_range;

            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header User-Agent        $http_user_agent;
            proxy_set_header Accept            $http_accept;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $remote_addr;         # ВАЖНО: только клиент, без $proxy_add_...
            proxy_set_header True-Client-IP     $remote_addr;
            proxy_set_header CF-Connecting-IP   $remote_addr;

            # Спрячем Accept-Ranges, чтобы клиенты не провоцировали Range-запросы
            proxy_hide_header Accept-Ranges;
            add_header       Accept-Ranges "none" always;

            proxy_pass https://$upstream_host$request_uri;
        }

        location @handle_redirect_main {
            internal;

            include /etc/nginx/conf.d/cors.conf;
            # include /etc/nginx/conf.d/hide_headers_upstream.conf;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header X-Proxy-loc2 "main-redir" always;
            add_header X-Proxy-Subdomain $upstream_http_location_subdomain always;
            add_header X-Proxy-upstream_http_location $upstream_http_location always;
            add_header X-Request-Id $request_id always;
            add_header X-Upstream-Status $upstream_status always;
            # add_header X-Upstream-Location $upstream_http_location always;
            add_header X-Node $hostname always;

            set $redirect_url https://$host/$upstream_http_location_subdomain$upstream_http_location_path;

            return 302 $redirect_url;
        }

        # ====== <subdomain>.storage.kinohd.co ======
        # /<subdomain>/<filepath>/<sign>:<time>/<filename>
        # location ~ ^/(?<subdomain>[a-z]+)/(?<filepath>[a-z]+/[a-f0-9]+)/(?<sign>[a-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
        # отдельный для mp4 - разрешаем range
        location ~ ^/(?<subdomain>[a-z0-9-]+)/(?<filepath>[a-z0-9-]+/[A-Fa-f0-9]+)/(?<sign>[A-Fa-f0-9]+):(?<time>\d+)/(?<filename>.+\.mp4)$ {
            include /etc/nginx/conf.d/cors.conf;
            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            limit_conn mp4_conn 10;
            limit_req  zone=mp4_req burst=20 nodelay;
            limit_conn_status 429;
            limit_req_status 429;

            # если клиент прислал multipart ranges — нафиг
            if ($http_range ~* ",") { return 416; }

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header X-Proxy-loc "sub-mp4" always;
            add_header X-Proxy-user-ip $remote_addr always;
            proxy_hide_header Server;
            proxy_hide_header X-Powered-By;
            proxy_ignore_headers Set-Cookie Cache-Control Expires;
            proxy_hide_header   Set-Cookie;
            add_header X-Request-Id $request_id always;
            add_header X-Node $hostname always;

            proxy_pass_header Content-Type;

            add_header X-Upstream-Status   $upstream_status always;

            if ($cache_key = "0") { 
            add_header X-Proxy-sign /$filepath/-$remote_addr-$time-SECRET always;
            add_header X-Proxy-reason "sub_sign" always; 
            return 403; 
            }

            set $upstream_host $subdomain.storage.kinohd.co;
            set $upstream_path /$filepath/$sign:$time/$filename;
            set $upstream_url  https://$upstream_host$upstream_path;

            # add_header X-Upstream-Host $upstream_host always;
            # add_header X-Upstream-URL $upstream_url always;
            # add_header X-Upstream-Location $upstream_http_location always;

            # Кэш
            slice 1m;  # размер кусочка — подберите (512k–2m обычно ок)
            proxy_cache backend_cache;
            proxy_cache_key $cache_key$slice_range;
            proxy_cache_valid 200 206 30d;
            # proxy_cache_revalidate on;
            add_header X-Proxy-Cache-Status $upstream_cache_status always;

            # proxy_hide_header Location;       # клиенту не отдаём

            # proxy_ignore_client_abort on;

            # сохраним сабдомен для внутреннего роутинга
            set $subdomain_keep $subdomain;
            set $path_keep $upstream_path;

            error_page 301 302 303 307 308 = @handle_redirect_sub;

            proxy_ssl_server_name on;
            proxy_set_header Host $upstream_host;
            proxy_ssl_name $upstream_host;
            proxy_set_header Range     $slice_range;   # переопределяем range
            proxy_set_header If-Range  "";             # if-range от клиента не нужен для slice
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header User-Agent        $http_user_agent;
            proxy_set_header Accept            $http_accept;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $remote_addr;         # ВАЖНО: только клиент, без $proxy_add_...
            proxy_set_header True-Client-IP     $remote_addr;
            proxy_set_header CF-Connecting-IP   $remote_addr;

            # заставляем браузер скачать, а не проигрывать, если есть ?filename=...
            add_header Content-Disposition $content_disposition always;
            add_header X-Content-Type-Options nosniff always;

            # ВАЖНО: заголовки для КЛИЕНТА
            add_header Cache-Control "public, max-age=600, immutable" always;
            expires 10m;

            # Чтобы клиент не уходил в 304
            etag off;
            if_modified_since off;

            # Для плееров полезно:
            proxy_force_ranges on;

            proxy_pass https://$upstream_host$upstream_path;
        }

        # все кроме mp4 - запрещаем range
        location ~ ^/(?<subdomain>[a-z0-9-]+)/(?<filepath>[a-z0-9-]+/[A-Fa-f0-9]+)/(?<sign>[A-Fa-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
            include /etc/nginx/conf.d/cors.conf;
            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            limit_conn ts_conn 20;
            limit_req  zone=ts_req burst=20 nodelay;
            limit_conn_status 429;
            limit_req_status 429;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header X-Proxy-loc "sub" always;
            add_header X-Proxy-user-ip $remote_addr always;
            proxy_hide_header Server;
            proxy_hide_header X-Powered-By;
            proxy_ignore_headers Vary Set-Cookie Cache-Control Expires;
            proxy_hide_header   Set-Cookie;
            add_header X-Request-Id $request_id always;
            add_header X-Node $hostname always;

            proxy_pass_header Content-Type;

            add_header X-Upstream-Status   $upstream_status always;

            if ($cache_key = "0") { 
            add_header X-Proxy-sign /$filepath/-$remote_addr-$time-SECRET always;
            add_header X-Proxy-reason "sub_sign" always; 
            return 403; 
            }

            set $upstream_host $subdomain.storage.kinohd.co;
            set $upstream_path /$filepath/$sign:$time/$filename;
            set $upstream_url  https://$upstream_host$upstream_path;

            # add_header X-Upstream-Host $upstream_host always;
            # add_header X-Upstream-URL $upstream_url always;
            # add_header X-Upstream-Location $upstream_http_location always;

            # Кэш
            proxy_cache backend_cache;
            proxy_cache_key $cache_key;
            proxy_cache_valid 200 30d;
            proxy_cache_revalidate off;
            add_header X-Proxy-Cache-Status $upstream_cache_status always;
            # add_header Server-Timing $upstream_cache_status,$hostname,rt;dur=$request_time,urt;dur=$upstream_response_time always;
            add_header Server-Timing "rt;dur=$request_time, urt;dur=$upstream_response_time, cache;desc=\"$upstream_cache_status\", node;desc=\"$hostname\"" always;
            # proxy_hide_header Location;       # клиенту не отдаём

            # proxy_ignore_client_abort on;

            # сохраним сабдомен для внутреннего роутинга
            set $subdomain_keep $subdomain;
            set $path_keep $upstream_path;

            error_page 301 302 303 307 308 = @handle_redirect_sub;

            proxy_ssl_server_name on;
            proxy_set_header Host $upstream_host;
            proxy_ssl_name $upstream_host;
            proxy_set_header Range             "";
            proxy_set_header If-Range          "";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header User-Agent        $http_user_agent;
            proxy_set_header Accept            $http_accept;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $remote_addr;         # ВАЖНО: только клиент, без $proxy_add_...
            proxy_set_header True-Client-IP     $remote_addr;
            proxy_set_header CF-Connecting-IP   $remote_addr;

            # Спрячем Accept-Ranges, чтобы клиенты не провоцировали Range-запросы
            proxy_hide_header Accept-Ranges;
            add_header       Accept-Ranges "none" always;

            # ВАЖНО: заголовки для КЛИЕНТА
            add_header Cache-Control "public, max-age=600, immutable" always;
            expires 10m;

            # Чтобы клиент не уходил в 304
            etag off;
            if_modified_since off;

            # Для плееров полезно:
            proxy_force_ranges off;

            proxy_pass https://$upstream_host$upstream_path;
        }

        # обработчик редиректов
        location @handle_redirect_sub {
            internal;

            include /etc/nginx/conf.d/cors.conf;
            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            set $upstream_host $upstream_http_location_domain;
            set $upstream_path $upstream_http_location_path;
            set $upstream_url  https://$upstream_host$upstream_path;
            proxy_set_header Range    $http_range;
            proxy_set_header If-Range $http_if_range;

            add_header X-Proxy-loc "sub_redir" always;
            add_header X-Proxy-Upstream-Location x$upstream_http_location always;
            add_header X-Proxy-Upstream-Url x$upstream_url always;
            add_header X-Proxy-cache-key $cache_key always;
            add_header X-Request-Id $request_id always;
            add_header X-Upstream-Status $upstream_status always;
            # add_header X-Upstream-Location $upstream_http_location always;
            add_header X-Node $hostname always;

            proxy_cache backend_cache;
            slice 1m;  # размер кусочка — подберите (512k–2m обычно ок)
            proxy_cache_key $cache_key$slice_range;
            proxy_cache_valid 200 206 30d;
            # proxy_cache_revalidate on;

            add_header X-Proxy-Cache-Status $upstream_cache_status always;
            add_header Server-Timing "rt;dur=$request_time, urt;dur=$upstream_response_time, cache;desc=\"$upstream_cache_status\", node;desc=\"$hostname\"" always;

            # proxy_intercept_errors off;

            proxy_ssl_server_name on;
            proxy_set_header Host $upstream_host; 
            proxy_ssl_name        $upstream_host;
            proxy_pass https://$upstream_host$upstream_path;
        }

    }
}