# load_module modules/ngx_http_js_module.so;

# Пробрасываем переменные окружения в Nginx
# env WEBDIS_HOST;
# env WEBDIS_PORT;
# env TEST_ENV;

pid /tmp/nginx.pid;

worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 16384;
    # опционально (на Linux обычно ок и без этого)
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;

    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /dev/stdout;
    # access_log off;
    error_log  /dev/stderr warn;

    sendfile on;
    # чтобы один клиент не монополизировал воркер при очень больших отдачах
    sendfile_max_chunk 1m;   
    tcp_nopush on;
    tcp_nodelay on;


    # aio threads;
    # directio 8m;
    # output_buffers 1 512k;
    # read_ahead 512k;

    open_file_cache max=500000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;


    proxy_cache_max_range_offset 0;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_lock_age 10s;
    proxy_force_ranges on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 200 10d;
    proxy_ignore_client_abort on;
    proxy_intercept_errors on;

    proxy_connect_timeout 5s;
    proxy_send_timeout    15s;
    proxy_read_timeout    30s;
    send_timeout 60s;

    proxy_buffering on;
    proxy_buffers 16 256k;
    proxy_buffer_size 256k;
    proxy_busy_buffers_size 512k;



    map $upstream_http_location $redirect_subdomain {
        default "";
        ~^https?://([a-z]+)\. $1;
    }

    map $request_uri $request_uri_without_subdomain {
        # (https?://HOST/ v2 /)[^/]+ ( /остальное )
        ~^/v2/[^/]+(.*)$   $1;
        default                                $request_uri;
    }

    js_import main from /etc/nginx/js/main.js;
    js_import sign from /etc/nginx/js/check_sign.js;
    js_import follow from /etc/nginx/js/follow_redirect.js;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=backend_cache:256m max_size=400g inactive=30d use_temp_path=off;

    js_set $cache_key sign.check_sign;

    map $arg_filename $safe_filename {
        "~^([0-9A-Za-zА-Яа-яЁё\.\-\_ ]+)$" $1;
        default "";
    }

    map $safe_filename $content_disposition {
        ""      "";
        default 'attachment; filename="$safe_filename"';
    }

    server {
        listen 443 ssl;

        # ECC (основной сертификат)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # RSA fallback
        # ssl_certificate     /etc/nginx/certs/fullchain_rsa.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey_rsa.pem;
        ssl_session_cache shared:SSL:200m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;   # обычно хватает, можно не задавать явно
        # можно ужать набор, но без фанатизма
        ssl_protocols TLSv1.2 TLSv1.3;

        location /favicon.ico {
            access_log off;
            return 200;
        }

        location /hello {
            js_content main.hello;
        }

        # location /test {
        #     default_type text/plain;
        #     return 200 "TEST_ENV is ${TEST_ENV}\n";
        # }

        location /debug-upstream {
            proxy_pass https://httpbin.org/anything;   # или https://httpbun.com/anything
            proxy_set_header X-Forwarded-Host "";
            proxy_set_header X-Debug "from-nginx";
        }

        # имитация запроса на базовый домен storage.kinohd.co. всегда редирект на /v2/subdomain/...
        location ~ ^/v2/(?<filepath>[a-z]+\/[a-f0-9]+)/(?<sign>[a-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
            include /etc/nginx/conf.d/cors.conf;

            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            add_header X-Edge-loc "v2main" always;

            if ($cache_key = "0") {
                add_header X-Edge-loc "sign" always;
                return 403;
            }

            # основной апстрим
            set $upstream_url https://storage.kinohd.co/$filepath/$sign:$time/$filename;

            proxy_cache backend_cache;
            proxy_cache_key $cache_key;
            add_header X-Edge-Cache-Status $upstream_cache_status always;

            proxy_hide_header Location;             # спрятать Location апстрима

            # для основного запроса подставим правильный Host (работает и без)
            proxy_set_header Host storage.kinohd.co;

            proxy_pass $upstream_url;
            error_page 301 302 303 307 308 = @handle_redirect1;

            # заставляем браузер скачать, а не проигрывать, если есть ?filename=...
            add_header Content-Disposition $content_disposition always;
            add_header X-Content-Type-Options nosniff always;
        
        }

        # имитация запроса уже без редиректа на ember.storage.kinohd.co
        location ~ ^/v2/(?<subdomain>[a-z]+)/v2/(?<filepath>[a-z]+\/[a-f0-9]+)/(?<sign>[a-f0-9]+):(?<time>\d+)/(?<filename>.+)$ {
            include /etc/nginx/conf.d/cors.conf;
            include /etc/nginx/conf.d/hide_headers_upstream.conf;

            add_header X-Edge-loc "v2subdomain" always;

            if ($cache_key = "0") {
                add_header X-Edge-loc "sign" always;
                return 403;
            }

            # основной апстрим
            set $upstream_url https://$subdomain.storage.kinohd.co/$filepath/$sign:$time/$filename;

            add_header X-Edge-upstream_url $upstream_url always;
            proxy_cache backend_cache;
            proxy_cache_key $cache_key;
            add_header X-Edge-Cache-Status $upstream_cache_status always;

            # для основного запроса подставим правильный Host (работает и без)
            proxy_set_header Host $subdomain.storage.kinohd.co;

            proxy_pass $upstream_url;
            error_page 301 302 303 307 308 = @handle_redirect2;
        }

        location @handle_redirect1 {
            internal;

            include /etc/nginx/conf.d/cors.conf;

            add_header X-Edge-loc2 "redir1" always;
            add_header X-Edge-Subdomain $redirect_subdomain always;
            add_header X-Edge-upstream_http_location $upstream_http_location always;

            # set $new_url https://nginx.cis-vproxy.orb.local/v2/$redirect_subdomain$request_uri;
            set $new_url https://vproxy.kinohd.co/v2/$redirect_subdomain$request_uri;

            # add_header Location $new_url always;
            return 302 $new_url;
        }

        location @handle_redirect2 {
            internal;
            include /etc/nginx/conf.d/cors.conf;

            add_header X-Edge-loc2 "redir2" always;
            add_header X-Edge-Subdomain $redirect_subdomain always;
            add_header X-Edge-upstream_http_location $upstream_http_location always;

            # set $new_url https://nginx.cis-vproxy.orb.local/v2/$redirect_subdomain$request_uri_without_subdomain;
            set $new_url https://vproxy.kinohd.co/v2/$redirect_subdomain$request_uri_without_subdomain;

            # add_header Location $new_url always;
            return 302 $new_url;
        }

        location @handle_redirect3 {
            internal;

            include /etc/nginx/conf.d/cors.conf;

            add_header X-Edge-loc2 "redir" always;

            # $upstream_http_location — полный URL (http[s]://host/path...)
            set $redir $upstream_http_location;

            # включим те же настройки кэша, чтобы кэшировать конечный ответ после редиректа
            proxy_cache backend_cache;

            proxy_cache_key $cache_key;  
            add_header X-Edge-Cache-Status $upstream_cache_status always;

            # важно: proxy_pass на ПОЛНЫЙ URL допустим, нужен resolver
            proxy_pass $redir;

            # при полном URL Host берётся из самого URL — лишний proxy_set_header не нужен
            recursive_error_pages on;    # разрешаем повторно обрабатывать 30x
        }


        # location @handle_redirect {
        #     js_content follow.follow;
        # }

    }
}