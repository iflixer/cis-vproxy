# load_module modules/ngx_http_js_module.so;

# Пробрасываем переменные окружения в Nginx
# env WEBDIS_HOST;
# env WEBDIS_PORT;
# env TEST_ENV;

pid /tmp/nginx.pid;

worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    # 10.43.0.10 <-- IP kube-dns
    # resolver 10.43.0.10 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver 10.43.0.10 valid=300s ipv6=off;
    resolver_timeout 5s;

    # отключаем проверку частотности для префетча
    map $arg_pf $limit_key {
        1       "";
        default $binary_remote_addr;
    }

    limit_conn_zone $limit_key zone=ts_conn:10m;
    limit_req_zone  $limit_key zone=ts_req:20m rate=30r/s;
    limit_conn_zone $limit_key zone=mp4_conn:10m;
    limit_req_zone  $limit_key zone=mp4_req:20m rate=50r/s;

    log_subrequest off;

    log_format main '$remote_addr - $host "$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        '"$upstream_cache_status" "$upstream_http_location"';
    log_format dbg '$remote_addr "$request" $status '
                'rt=$request_time urt=$upstream_response_time '
                'sent=$bytes_sent ulen=$upstream_response_length '
                'cache=$upstream_cache_status';

    log_format dbg2 '__NODE_NAME__ $status $upstream_cache_status $upstream_response_time $upstream_response_length $bytes_sent'
                ' $remote_addr "$request" "$http_referer" "$http_user_agent"';


    log_format cdn_json escape=json
    '{"ts":"$time_iso8601",'
    '"node":"__NODE_NAME__",'
    '"remote":"$remote_addr",'
    '"xff":"$http_x_forwarded_for",'
    '"host":"$host",'
    '"server":"$server_name",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"args":"$args",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"req_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"cache":"$upstream_cache_status",'
    '"range":"$http_range",'
    '"referer":"$http_referer",'
    '"req_len":$request_length,'
    '"conn":$connection,'
    '"conn_reqs":$connection_requests,'
    '"uct":"$upstream_connect_time",'
    '"uht":"$upstream_header_time",'
    '"urt":"$upstream_response_time",'
    '"up_cache_control":"$upstream_http_cache_control",'
    '"up_age":"$upstream_http_age",'
    '"limit_conn":"$limit_conn_status",'
    '"limit_req":"$limit_req_status",'
    '"ua":"$http_user_agent"}';


    # ВАЖНО. "max_size=400g" - это плейсхолдер. заменяется на реальное значение при запуске контейнера, в зависимости от доступного места на диске. 
    # proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=backend_cache:256m max_size=400g inactive=30d use_temp_path=off;
    proxy_max_temp_file_size 0;
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=backend_cache:512m
        max_size=400g
        inactive=5d
        use_temp_path=off
        manager_files=300000
        manager_sleep=100ms
        manager_threshold=3000ms;

    # в файл
    # access_log /var/log/nginx/access2.log main;
    # access_log /dev/stdout cdn_json;
    # access_log /dev/stdout cdn_json if=$log_normal;
    access_log /dev/stdout cdn_json;
    # ошибки — и в файл, и в stderr
    # error_log /var/log/nginx/error2.log debug;
    # error_log /dev/stderr warn;
    error_log /dev/stderr info;

    # proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=backend_cache:200m
    #                    max_size=600g inactive=7d use_temp_path=off;
    # конфиг кеша в отдельном файле чтобы можно было сгенерить для каждой ноды отдельно
    # include /etc/nginx/generated/cache.conf;

    map $http_user_agent $is_bot {
        default 0;
        ~*(meta-externalagent|facebookexternalhit|Twitterbot|LinkedInBot) 1;
    }

    #protection from caching 0 answers
    map $upstream_http_content_length $flag_cache_empty {
    0       1;
    default 0;
    }

    map $upstream_http_location $upstream_http_location_subdomain {
        default "";
        ~^https?://([a-z0-9-]+)\.[^/]+    $1;
    }
    map $upstream_http_location $upstream_http_location_domain {
        default "";
        ~^https?://([^/]+)                $1;
    }
    map $upstream_http_location $upstream_http_location_path {
        default "";
        ~^https?://[^/]+(/.*)$            $1;
    }

    map $arg_filename $safe_filename {
        default $arg_filename;
    }

    map $safe_filename $content_disposition {
        ""      "";
        default 'attachment; filename="$safe_filename"';
    }

    map $arg_pf $up_range {
    1       "bytes=0-";
    default $http_range;
    }

    js_import /etc/nginx/js/signer.js;
    js_import /etc/nginx/js/debug.js;

    js_import /etc/nginx/js/prefetch.js;


    upstream indi_r2 {
        server pub-040aec0ec21e4cb6a1146c6fb02aeb9e.r2.dev:443;
        keepalive 128;
    }

    server {
        listen 80 default_server;

        # ECC (основной сертификат)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # RSA fallback
        # ssl_certificate     /etc/nginx/certs/fullchain_rsa.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey_rsa.pem;
        ssl_session_cache shared:SSL:200m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;   # обычно хватает, можно не задавать явно
        # можно ужать набор, но без фанатизма
        ssl_protocols TLSv1.2 TLSv1.3;

        js_set $cache_key signer.check_sign;

        location = /debug-secret123 {
            js_content debug.show_secret;
        }
        
        # ts
        location ~* ^/indi/(.*.ts)$ {
                if ($is_bot) {
                    return 403;
                }
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                add_header 'Content-Type' 'video/mp2t';

                # сбросить alt-svc (запретить/очистить h3 объявления)
                add_header Alt-Svc 'clear' always;

                limit_conn ts_conn 20;
                limit_req  zone=ts_req burst=20 nodelay;
                limit_conn_status 429;
                limit_req_status 429;

                set $indi_backend_host pub-040aec0ec21e4cb6a1146c6fb02aeb9e.r2.dev;

                proxy_http_version     1.1;
                proxy_set_header       Connection "";
                proxy_set_header       Authorization '';
                proxy_set_header       Host $indi_backend_host;

                proxy_hide_header      x-amz-id-2;
                proxy_hide_header      x-amz-request-id;
                proxy_hide_header      x-amz-meta-server-side-encryption;
                proxy_hide_header      x-amz-server-side-encryption;
                proxy_hide_header      x-amz-meta-src_last_modified_millis;
                proxy_hide_header      x-amz-meta-s3cmd-attrs;
                proxy_hide_header      x-amz-version-id;
                proxy_hide_header      Set-Cookie;
                proxy_hide_header      Content-Type;
                proxy_hide_header      Accept-Ranges;
                proxy_hide_header      CF-RAY;
                proxy_hide_header      Access-Control-Allow-Origin;
                proxy_ignore_headers   Vary Cache-Control Expires Set-Cookie;
                proxy_set_header Range $up_range;

                proxy_force_ranges on;
                proxy_intercept_errors on;
                proxy_ssl_server_name on;
                proxy_ssl_name $indi_backend_host;

                proxy_pass https://indi_r2/out/$1;

                proxy_cache backend_cache;
                proxy_no_cache $flag_cache_empty;
                proxy_cache_bypass $flag_cache_empty;
                proxy_cache_revalidate off;
                proxy_cache_valid 200 206 999h;
                proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                proxy_cache_background_update on;
                proxy_cache_lock on;
                proxy_cache_lock_timeout 10s;
                proxy_cache_lock_age 10s;
                proxy_cache_key "$uri";

                add_header X-Proxy-Cache-Status $upstream_cache_status always;
                add_header X-Node $hostname always;
                add_header Server-Timing "rt;dur=$request_time, urt;dur=$upstream_response_time, cache;desc=\"$upstream_cache_status\", node;desc=\"$hostname\"" always;

                js_header_filter prefetch.header;
        }

        # m3u8
        location ~* ^/indi/(.*.m3u8)$ {
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                add_header 'Content-Type' 'application/vnd.apple.mpegurl';

                # сбросить alt-svc (запретить/очистить h3 объявления)
                add_header Alt-Svc 'clear' always;

                set $indi_backend_host pub-040aec0ec21e4cb6a1146c6fb02aeb9e.r2.dev;

                proxy_http_version     1.1;
                proxy_set_header       Connection "";
                proxy_set_header       Authorization '';
                proxy_set_header       Host $indi_backend_host;

                proxy_hide_header      x-amz-id-2;
                proxy_hide_header      x-amz-request-id;
                proxy_hide_header      x-amz-meta-server-side-encryption;
                proxy_hide_header      x-amz-server-side-encryption;
                proxy_hide_header      x-amz-meta-src_last_modified_millis;
                proxy_hide_header      x-amz-meta-s3cmd-attrs;
                proxy_hide_header      x-amz-version-id;
                proxy_hide_header      Set-Cookie;
                proxy_hide_header      Content-Type;
                proxy_hide_header      Accept-Ranges;
                proxy_hide_header      CF-RAY;
                proxy_hide_header      Access-Control-Allow-Origin;
                proxy_ignore_headers Vary Cache-Control Expires Set-Cookie;

                proxy_intercept_errors on;
                proxy_ssl_server_name on;
                proxy_ssl_name $indi_backend_host;

                proxy_pass https://indi_r2/out/$1;
                proxy_cache backend_cache;
                proxy_no_cache $flag_cache_empty;
                proxy_cache_bypass $flag_cache_empty;
                proxy_cache_valid 200 206 999h;
                proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                proxy_cache_background_update on;
                proxy_cache_lock on;
                proxy_cache_lock_age 1m;
                proxy_cache_key "$uri";

                add_header X-Proxy-Cache-Status $upstream_cache_status always;
                add_header X-IP $remote_addr;
                add_header X-Slice-range $slice_range;
                add_header X-Proxy-Agent $http_user_agent;
                add_header X-Node $hostname always;
                add_header Server-Timing "rt;dur=$request_time, urt;dur=$upstream_response_time, cache;desc=\"$upstream_cache_status\", node;desc=\"$hostname\"" always;
        }

        location ~* ^/indi/(.*.mp4)$ {
            if ($is_bot) {
                return 403;
            }

            limit_conn mp4_conn 10;
            limit_req  zone=mp4_req burst=20 nodelay;
            limit_conn_status 429;
            limit_req_status 429;

            set $indi_backend_host pub-040aec0ec21e4cb6a1146c6fb02aeb9e.r2.dev;

            set $indi_backend https://$indi_backend_host/out/$1;
            add_header X-B $indi_backend always;

            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_set_header       Authorization '';
            proxy_set_header       Host $indi_backend_host;

            proxy_hide_header      x-amz-id-2;
            proxy_hide_header      x-amz-request-id;
            proxy_hide_header      x-amz-meta-server-side-encryption;
            proxy_hide_header      x-amz-server-side-encryption;
            proxy_hide_header      x-amz-meta-src_last_modified_millis;
            proxy_hide_header      x-amz-meta-s3cmd-attrs;
            proxy_hide_header      x-amz-version-id;
            proxy_hide_header      Set-Cookie;

            proxy_ignore_headers Vary;
            proxy_force_ranges on;
            proxy_intercept_errors on;
            proxy_ssl_server_name on;

            proxy_pass $indi_backend;
            proxy_cache backend_cache;
            proxy_cache_valid 200 206 30d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_lock_age 5m;
            slice              2m;
            proxy_cache_key    "$uri$slice_range";
            proxy_set_header   Range $slice_range;

            add_header Cache-Control max-age=31536000;
            add_header X-Proxy-Cache-Status $upstream_cache_status always;
            add_header X-IP $remote_addr;
            add_header X-Slice-range $slice_range;
            add_header X-Proxy-Agent $http_user_agent;
            add_header X-Node $hostname always;
            add_header Server-Timing "rt;dur=$request_time, urt;dur=$upstream_response_time, cache;desc=\"$upstream_cache_status\", node;desc=\"$hostname\"" always;
            }


        # простая проверка живости
        location = /alive { 
            add_header Content-Type text/plain; 
            return 200 "OK\n"; 
        }
        location = / { 
            access_log off;
            log_not_found off;
            add_header Content-Type text/plain; 
            return 200 "br vproxy HP\n"; 
        }
        location / { 
            access_log off;
            log_not_found off;
            return 404; 
        }
        location = /myip {
            default_type text/plain;
            return 200 "remote_addr: $remote_addr | realip_remote_addr: $realip_remote_addr | http_x_forwarded_for: $http_x_forwarded_for\n";
        }

        location = /hostname {
            default_type text/plain;
            return 200 "$hostname\n";
        }

        location = /nodename {
            default_type text/plain;
            return 200 "__NODE_NAME__\n";
        }

        location /nginx_status_HDHDJEUWOWLLAPQPP10XZ {
            stub_status;
        }

    }
}